<svg xmlns="http://www.w3.org/2000/svg" width="150" height="150">
  <defs>
    <filter id="cotton-paper" x="0" y="0" width="100%" height="100%">
      <!-- High frequency noise for fine paper fibers -->
      <feTurbulence type="fractalNoise" baseFrequency="0.28" numOctaves="4" result="noise"/>
      <!-- Soft sepia color matrix mapping to create a warm paper color grain -->
      <feColorMatrix type="matrix" values="0 0 0 0 0.24
                                            0 0 0 0 0.20
                                            0 0 0 0 0.16
                                            0.11 0 0 0 0" result="texture"/>
      <feComposite operator="in" in="texture" in2="SourceGraphic"/>
    </filter>
  </defs>
  <!-- Fill canvas with the paper grain filter, using white fill to ensure the filter processes correctly -->
  <rect width="100%" height="100%" fill="white" filter="url(#cotton-paper)"/>
</svg>
