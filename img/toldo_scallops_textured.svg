<svg xmlns="http://www.w3.org/2000/svg" width="120" height="31" viewBox="0 0 120 31">
  <defs>
    <!-- Filtro de textura de papel de algodón (fibra orgánica) -->
    <filter id="cotton-texture" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.32" numOctaves="4" result="noise"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.24
                                            0 0 0 0 0.20
                                            0 0 0 0 0.16
                                            0.11 0 0 0 0" result="coloredNoise"/>
      <feComposite operator="in" in="coloredNoise" in2="SourceGraphic" result="composite"/>
      <feBlend mode="multiply" in="SourceGraphic" in2="composite"/>
    </filter>

    <!-- Gradientes para las ondas que aportan profundidad vertical suave -->
    <linearGradient id="scallop1-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B0BFAC"/>
      <stop offset="100%" stop-color="#93a290"/>
    </linearGradient>
    
    <linearGradient id="scallop2-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#95AB9E"/>
      <stop offset="100%" stop-color="#798b7e"/>
    </linearGradient>
  </defs>
  <!-- Aplicar textura únicamente sobre los círculos festoneados, preservando la transparencia exterior -->
  <g filter="url(#cotton-texture)">
    <circle cx="30" cy="0" r="30" fill="url(#scallop1-grad)"/>
    <circle cx="90" cy="0" r="30" fill="url(#scallop2-grad)"/>
  </g>
</svg>
